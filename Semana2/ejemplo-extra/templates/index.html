<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SO1 Finn McMissil</title>
    <style>
        body {
            background-color: {{ color_fondo }};
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 { font-size: 3em; margin: 0; }
        .contador { font-size: 5em; font-weight: bold; margin: 20px 0; }
        p { font-size: 1.2em; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sistemas Operativos 1</h1>
        <p>Visitas a este contenedor:</p>
        <div class="contador">{{ visitas }}</div>
        <p>Finn McMissil</p>
    </div>
</body>
</html>
