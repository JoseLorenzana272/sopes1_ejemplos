apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-server-deploy
  namespace: mumnk8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-server
  template:
    metadata:
      labels:
        app: go-server
    spec:
      containers:
      - name: go-server
        image: joselorenzana272/go-server:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 50051