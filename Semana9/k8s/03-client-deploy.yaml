apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-client-deploy
  namespace: mumnk8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-client
  template:
    metadata:
      labels:
        app: go-client
    spec:
      containers:
      - name: go-client
        image: joselorenzana272/go-client:v2
        imagePullPolicy: Always